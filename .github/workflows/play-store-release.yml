name: Play Store Release

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track (internal, alpha, beta, production)'
        required: true
        default: 'internal'
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: Decode keystore
      run: |
        echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

    - name: Configure keystore properties
      run: |
        echo "RELEASE_STORE_FILE=release.keystore" >> $GITHUB_ENV
        echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
        echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
        echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build AAB (release)
      run: |
        ./gradlew bundleRelease --no-daemon --stacktrace
      env:
        JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release-aab
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Install gcloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        version: 'latest'
        service_account_key: ${{ secrets.PLAY_STORE_JSON }}
        export_default_credentials: true

    - name: Upload to Play Store (internal by default)
      env:
        TRACK: ${{ github.event.inputs.track || 'internal' }}
      run: |
        # Install fastlane (optional) or use Google Play Developer API via gcloud
        # Using fastlane supply (requires Ruby). Alternatively use google-play-upload actions.
        gem install fastlane -v 2.212.0 --no-document || true
        mkdir -p fastlane
        cat > fastlane/Appfile <<EOF
        json_key_data = ENV['PLAY_STORE_JSON']
        EOF
        # Write service account JSON to file
        echo "${{ secrets.PLAY_STORE_JSON }}" > /tmp/playstore.json
        # Upload using fastlane supply
        bundle exec fastlane supply --aab app/build/outputs/bundle/release/app-release.aab --json_key /tmp/playstore.json --track "${{ env.TRACK }}" || true

      # Alternative: use r0adkll/upload-google-play action if preferred.

    - name: Notify
      run: echo "AAB built and uploaded to Play Store track: ${{ github.event.inputs.track || 'internal' }}"
